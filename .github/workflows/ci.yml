name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  CATENOID_SERVICE_ACCOUNT_KEY: ${{ secrets.CATENOID_SERVICE_ACCOUNT_KEY }}
  CATENOID_API_ACCESS_TOKEN: ${{ secrets.CATENOID_API_ACCESS_TOKEN }}
  CATENOID_CUSTOM_KEY: ${{ secrets.CATENOID_CUSTOM_KEY }}
  CATENOID_SECURITY_KEY: ${{ secrets.CATENOID_SECURITY_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests (Node.js native test runner)
        run: npm test

      - name: Build
        run: npm run build
